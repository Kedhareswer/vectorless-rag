name: Release TGG

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: TGG — Tree-Grounded Generation

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Strip 'v' prefix and split
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Bump patch
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version in project files
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Update package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json

          # Update tauri.conf.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

          # Update Cargo.toml (only the package version, not dependency versions)
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "TGG ${{ steps.version.outputs.tag }}"
          releaseBody: |
            ## TGG ${{ steps.version.outputs.tag }} — Tree-Grounded Generation

            ### What's new
            See [commit history](https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.tag }}...HEAD) for details.

            ### Download
            - **Windows Installer (.exe)** — recommended, includes auto-updater
            - **Windows MSI (.msi)** — for enterprise / group policy deployment

            ---
            *No embeddings. No vector database. Just structured exploration.*
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
